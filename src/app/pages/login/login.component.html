<div class="auth-container">
  <div class="auth-card">
    <h2>Iniciar sesión</h2>
    <p class="subtitle">Bienvenido de nuevo a MenteCalma</p>

    <form (ngSubmit)="iniciarSesion()" #loginForm="ngForm">
      <div class="form-group">
        <label for="correo">Correo electrónico</label>
        <input
          type="email"
          id="correo"
          name="correo"
          [(ngModel)]="correo"
          placeholder="Ingresa tu correo"
          required
          email
        />
      </div>

      <div class="form-group">
        <label for="clave">Contraseña</label>
        <input
          type="password"
          id="clave"
          name="clave"
          [(ngModel)]="clave"
          placeholder="Ingresa tu contraseña"
          required
        />
      </div>

      <button type="submit" class="btn-auth">Ingresar</button>
    </form>

    <p class="link-text">
      ¿No tienes cuenta?
      <a routerLink="/registro">Regístrate aquí</a>
    </p>
  </div>
</div>
